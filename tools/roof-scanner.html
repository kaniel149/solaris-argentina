<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solaris Argentina — Roof Scanner Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#0B3D2E;--green2:#0d4a37;--gold:#D4A843;--accent:#1A7A5A;--coral:#E85D3A;--bg:#0A0A0A;--card:#142822;--border:rgba(255,255,255,0.1);--pearl:#FEFDFB}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--pearl);overflow:hidden;height:100vh}

/* ── Login Overlay ── */
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#060606 0%,var(--green) 50%,#060606 100%);z-index:10000;display:flex;align-items:center;justify-content:center;transition:opacity .5s}
.login-overlay.hidden{opacity:0;pointer-events:none}
.login-box{background:rgba(10,10,10,0.85);border:1px solid rgba(212,168,67,0.3);border-radius:16px;padding:48px 40px;width:380px;text-align:center;backdrop-filter:blur(20px)}
.login-logo{margin-bottom:8px}
.login-logo .brand{font-size:28px;font-weight:800;letter-spacing:2px;color:var(--gold)}
.login-logo .sub{font-size:13px;color:rgba(254,253,251,0.5);letter-spacing:4px;text-transform:uppercase;margin-top:2px}
.login-tagline{font-size:11px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin:16px 0 32px;opacity:0.7}
.login-field{width:100%;background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--pearl);padding:12px 16px;border-radius:8px;font-size:14px;font-family:inherit;outline:none;margin-bottom:12px;transition:border-color .2s}
.login-field:focus{border-color:var(--gold)}
.login-field::placeholder{color:rgba(255,255,255,0.3)}
.login-btn{width:100%;background:var(--gold);color:var(--bg);border:none;padding:14px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px;transition:background .2s}
.login-btn:hover{background:#c49a3a}
.login-error{color:var(--coral);font-size:12px;margin-top:12px;min-height:18px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shake{animation:shake .4s ease}

/* ── Header ── */
.header{background:linear-gradient(135deg,var(--green) 0%,var(--green2) 100%);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);z-index:1000;position:relative}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:var(--green)}
.logo-text{font-size:16px;font-weight:700}.logo-text span{color:var(--gold)}
.header-stats{display:flex;gap:20px}
.hstat{text-align:center}
.hstat-val{font-size:18px;font-weight:800;color:var(--gold)}
.hstat-label{font-size:10px;opacity:0.6;text-transform:uppercase;letter-spacing:1px}
.header-user{font-size:11px;opacity:0.5;display:flex;align-items:center;gap:8px}
.logout-btn{background:none;border:1px solid var(--border);color:rgba(255,255,255,0.5);padding:3px 10px;border-radius:4px;font-size:10px;cursor:pointer;font-family:inherit}
.logout-btn:hover{border-color:var(--gold);color:var(--gold)}

/* ── Main Layout ── */
.main{display:flex;height:calc(100vh - 52px)}

/* ── Sidebar ── */
.sidebar{width:380px;min-width:380px;background:var(--green);display:flex;flex-direction:column;border-right:1px solid var(--border);z-index:500}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border)}
.sidebar-tabs button{flex:1;padding:10px 8px;background:none;border:none;color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;transition:all .2s}
.sidebar-tabs button.active{color:var(--gold);border-bottom-color:var(--gold)}
.sidebar-tabs button:hover{color:#fff}

/* Filters */
.filters-bar{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:4px;align-items:center}
.fbtn{background:var(--green2);border:1px solid var(--border);color:rgba(255,255,255,0.7);padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.fbtn:hover{border-color:var(--gold);color:#fff}
.fbtn.on{background:var(--gold);color:var(--green);border-color:var(--gold);font-weight:600}
.search-row{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;gap:6px}
.search-row input{flex:1;background:var(--green2);border:1px solid var(--border);color:#fff;padding:6px 10px;border-radius:6px;font-size:12px;font-family:inherit;outline:none}
.search-row input:focus{border-color:var(--gold)}
.search-row select{background:var(--green2);border:1px solid var(--border);color:#fff;padding:6px;border-radius:6px;font-size:11px;font-family:inherit;outline:none}

/* Building list */
.panel-content{flex:1;overflow-y:auto;padding:0}
.bldg-card{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.bldg-card:hover{background:rgba(212,168,67,0.08)}
.bldg-card.selected{background:rgba(212,168,67,0.15);border-left:3px solid var(--gold)}
.bldg-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.bldg-name{font-size:13px;font-weight:600;flex:1;margin-right:8px}
.bldg-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;flex-shrink:0}
.badge-A{background:rgba(212,168,67,0.2);color:var(--gold)}
.badge-B{background:rgba(46,216,154,0.2);color:#2ED89A}
.badge-C{background:rgba(100,150,255,0.2);color:#6496FF}
.badge-D{background:rgba(102,102,102,0.2);color:#888}
.bldg-meta{font-size:11px;opacity:0.5;margin-bottom:4px}
.bldg-stats{display:flex;gap:12px;font-size:11px}
.bldg-stats span{color:var(--gold);font-weight:600}
.bldg-actions{display:flex;gap:4px;margin-top:6px}
.bldg-actions button{background:var(--green2);border:1px solid var(--border);color:#fff;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;font-family:inherit}
.bldg-actions button:hover{border-color:var(--gold);color:var(--gold)}
.bldg-actions button.pip-on{background:var(--accent);border-color:var(--accent)}

/* Compare bar */
.compare-bar{padding:8px 12px;background:var(--green2);border-top:1px solid var(--gold);display:none;align-items:center;justify-content:space-between;font-size:12px}
.compare-bar.show{display:flex}
.compare-bar button{background:var(--gold);color:var(--green);border:none;padding:4px 12px;border-radius:4px;font-weight:600;cursor:pointer;font-family:inherit;font-size:11px}
.compare-bar .clear-btn{background:var(--coral)}

/* Analytics */
.analytics-panel{padding:16px}
.analytics-panel h3{color:var(--gold);font-size:14px;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat-card{background:var(--green2);border-radius:8px;padding:12px;text-align:center}
.stat-card .sv{font-size:20px;font-weight:800;color:var(--gold)}
.stat-card .sl{font-size:10px;opacity:0.5;text-transform:uppercase;margin-top:2px}
.chart-section{margin-bottom:16px}
.chart-section h4{font-size:12px;color:var(--gold);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:11px}
.bar-label{width:90px;text-align:right;opacity:0.6;flex-shrink:0}
.bar-track{flex:1;height:16px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-size:9px;font-weight:600;transition:width .5s}
.bar-count{width:35px;font-size:11px;opacity:0.6}
.top-list{list-style:none;margin-top:8px}
.top-list li{display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid var(--border)}
.top-list .tl-rank{color:var(--gold);font-weight:700;width:20px}
.top-list .tl-name{flex:1;margin:0 8px}
.top-list .tl-val{font-weight:600;color:var(--accent)}

/* Map */
.map-wrap{flex:1;position:relative}
#map{width:100%;height:100%}
.map-ctrls{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:6px;z-index:10}
.map-ctrls button{background:rgba(11,61,46,0.9);border:1px solid var(--border);color:#fff;width:34px;height:34px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.map-ctrls button:hover{border-color:var(--gold);color:var(--gold)}
.map-ctrls button.active{background:var(--gold);color:var(--green);border-color:var(--gold)}
.style-toggle{position:absolute;top:12px;left:12px;display:flex;gap:2px;z-index:10;background:rgba(11,61,46,0.9);border-radius:6px;padding:2px;border:1px solid var(--border)}
.style-toggle button{background:none;border:none;color:rgba(255,255,255,0.6);padding:6px 12px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;transition:all .15s}
.style-toggle button.active{background:var(--gold);color:var(--green)}
.map-legend{position:absolute;bottom:12px;left:12px;background:rgba(11,61,46,0.92);border:1px solid var(--border);border-radius:8px;padding:10px 14px;z-index:10;font-size:11px}
.map-legend h5{color:var(--gold);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.lg-i{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.lg-d{width:10px;height:10px;border-radius:50%}

/* Popup */
.maplibregl-popup-content{background:var(--green)!important;color:var(--pearl)!important;border:1px solid var(--gold)!important;border-radius:10px!important;padding:16px!important;min-width:300px;max-width:360px;box-shadow:0 8px 30px rgba(0,0,0,0.5)!important}
.maplibregl-popup-tip{border-top-color:var(--gold)!important}
.maplibregl-popup-close-button{color:#fff!important;font-size:18px!important;right:8px!important;top:4px!important}
.popup-title{font-size:15px;font-weight:700;margin-bottom:4px;padding-right:20px}
.popup-sub{font-size:11px;opacity:0.5;margin-bottom:10px}
.popup-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-bottom:10px}
.popup-grid .pg-label{font-size:10px;opacity:0.5;text-transform:uppercase}
.popup-grid .pg-val{font-size:13px;font-weight:600}
.popup-btns{display:flex;gap:6px}
.popup-btns a,.popup-btns button{flex:1;text-align:center;padding:8px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;font-family:inherit;border:none}
.wa-btn{background:var(--accent);color:#fff}
.wa-btn:hover{background:#15634a}
.proposal-btn{background:var(--gold);color:var(--green)}
.proposal-btn:hover{background:#c49a3a}
.pip-toggle-btn{background:var(--green2);color:#fff;border:1px solid var(--border)!important}
.pip-toggle-btn.active{background:var(--accent);border-color:var(--accent)!important}
.note-area{width:100%;background:var(--green2);border:1px solid var(--border);color:#fff;padding:6px 8px;border-radius:4px;font-size:11px;font-family:inherit;resize:vertical;min-height:40px;margin-top:6px}
.note-area:focus{border-color:var(--gold);outline:none}

/* Compare overlay */
.compare-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:2000;display:none;align-items:center;justify-content:center}
.compare-overlay.show{display:flex}
.compare-box{background:var(--green);border:2px solid var(--gold);border-radius:12px;padding:24px;max-width:900px;width:90%;max-height:80vh;overflow-y:auto}
.compare-box h3{color:var(--gold);margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.compare-box .close-cmp{background:none;border:none;color:#fff;font-size:20px;cursor:pointer}
.compare-grid{display:grid;gap:16px}
.compare-col{background:var(--green2);border-radius:8px;padding:14px}
.compare-col h4{color:var(--gold);font-size:13px;margin-bottom:10px}
.cmp-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border)}
.cmp-label{opacity:0.5}
.cmp-val{font-weight:600}

/* Loading */
.loading{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
.loading.done{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid var(--green2);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{margin-top:12px;font-size:13px;opacity:0.6}

/* Mobile */
@media(max-width:768px){
  .sidebar{width:100%;min-width:unset;position:fixed;bottom:0;left:0;right:0;height:50vh;z-index:500;border-right:none;border-top:2px solid var(--gold)}
  .main{flex-direction:column}
  .map-wrap{height:50vh}
  .header-stats{display:none}
  .login-box{width:90%;padding:32px 24px}
}
.panel-content::-webkit-scrollbar{width:6px}
.panel-content::-webkit-scrollbar-track{background:var(--green)}
.panel-content::-webkit-scrollbar-thumb{background:var(--green2);border-radius:3px}
.panel-content::-webkit-scrollbar-thumb:hover{background:var(--gold)}
</style>
</head>
<body>

<!-- ═══ LOGIN OVERLAY ═══ -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box" id="loginBox">
    <div class="login-logo">
      <div class="brand">SOLARIS</div>
      <div class="sub">Argentina</div>
    </div>
    <div class="login-tagline">Roof Scanner Pro</div>
    <input class="login-field" id="loginUser" type="text" placeholder="Usuario" autocomplete="username" autofocus>
    <input class="login-field" id="loginPass" type="password" placeholder="Contraseña" autocomplete="current-password">
    <button class="login-btn" id="loginBtn" onclick="attemptLogin()">Ingresar</button>
    <div class="login-error" id="loginError"></div>
    <div style="margin-top:24px;font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:3px;text-transform:uppercase">Energía Propia</div>
  </div>
</div>

<!-- ═══ LOADING ═══ -->
<div class="loading" id="loading" style="display:none">
  <div class="spinner"></div>
  <p>Cargando edificios...</p>
</div>

<!-- ═══ HEADER ═══ -->
<div class="header" id="appHeader" style="display:none">
  <div class="logo">
    <div class="logo-mark">SA</div>
    <div class="logo-text"><span>Solaris</span> Argentina</div>
  </div>
  <div class="header-stats">
    <div class="hstat"><div class="hstat-val" id="h-buildings">0</div><div class="hstat-label">Edificios</div></div>
    <div class="hstat"><div class="hstat-val" id="h-mwp">0</div><div class="hstat-label">MWp</div></div>
    <div class="hstat"><div class="hstat-val" id="h-value">0</div><div class="hstat-label">USD M</div></div>
    <div class="hstat"><div class="hstat-val" id="h-pipeline">0</div><div class="hstat-label">Pipeline</div></div>
  </div>
  <div class="header-user">
    <span id="userDisplay"></span>
    <button class="logout-btn" onclick="doLogout()">Salir</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main" id="appMain" style="display:none">
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="active" onclick="switchTab('buildings',this)">🏢 Edificios</button>
      <button onclick="switchTab('analytics',this)">📊 Analíticas</button>
    </div>

    <div id="tab-buildings">
      <div class="filters-bar">
        <button class="fbtn on" data-pr="all" onclick="filterPriority('all',this)">Todos</button>
        <button class="fbtn" data-pr="A" onclick="filterPriority('A',this)">🥇 A</button>
        <button class="fbtn" data-pr="B" onclick="filterPriority('B',this)">🥈 B</button>
        <button class="fbtn" data-pr="C" onclick="filterPriority('C',this)">🥉 C</button>
        <button class="fbtn" data-pr="D" onclick="filterPriority('D',this)">D</button>
        <span style="margin-left:8px;opacity:0.3">|</span>
        <button class="fbtn" data-cat="industrial" onclick="filterCat('industrial',this)">🏭</button>
        <button class="fbtn" data-cat="commercial" onclick="filterCat('commercial',this)">🏢</button>
        <button class="fbtn" data-cat="warehouse" onclick="filterCat('warehouse',this)">📦</button>
        <button class="fbtn" data-cat="retail" onclick="filterCat('retail',this)">🛒</button>
        <button class="fbtn" data-cat="food_processing" onclick="filterCat('food_processing',this)">🍎</button>
        <button class="fbtn" data-cat="hotel" onclick="filterCat('hotel',this)">🏨</button>
        <button class="fbtn" data-cat="healthcare" onclick="filterCat('healthcare',this)">🏥</button>
        <button class="fbtn" data-cat="education" onclick="filterCat('education',this)">🏫</button>
        <span style="margin-left:4px;opacity:0.3">|</span>
        <button class="fbtn" data-sz="500" onclick="filterSize(500,this)">500m²+</button>
        <button class="fbtn" data-sz="1000" onclick="filterSize(1000,this)">1000m²+</button>
        <button class="fbtn" data-pip="1" onclick="filterPipeline(this)">🟢 Pipeline</button>
      </div>
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="🔍 Buscar nombre, categoría...">
        <select id="sortSelect" onchange="sortAndRender()">
          <option value="kwp">kWp ↓</option>
          <option value="area">Área ↓</option>
          <option value="savings">Ahorro ↓</option>
          <option value="payback">Retorno ↑</option>
          <option value="name">Nombre A-Z</option>
        </select>
      </div>
      <div class="panel-content" id="buildingList"></div>
      <div class="compare-bar" id="compareBar">
        <span>Comparar: <span id="cmpCount">0</span>/3</span>
        <div style="display:flex;gap:4px">
          <button onclick="showCompare()">Comparar</button>
          <button class="clear-btn" onclick="clearCompare()">Limpiar</button>
        </div>
      </div>
    </div>

    <div id="tab-analytics" style="display:none">
      <div class="panel-content">
        <div class="analytics-panel" id="analyticsContent"></div>
      </div>
    </div>
  </div>

  <div class="map-wrap">
    <div id="map"></div>
    <div class="style-toggle">
      <button id="btn-streets" class="active" onclick="setMapStyle('streets')">🗺️ Mapa</button>
      <button id="btn-sat" onclick="setMapStyle('satellite')">🛰️ Satélite</button>
    </div>
    <div class="map-ctrls">
      <button onclick="map.zoomIn()" title="Acercar">+</button>
      <button onclick="map.zoomOut()" title="Alejar">−</button>
      <button onclick="resetView()" title="Vista inicial">⌂</button>
    </div>
    <div class="map-legend">
      <h5>Prioridad</h5>
      <div class="lg-i"><div class="lg-d" style="background:#D4A843"></div> A — Alta (&gt;100 kWp)</div>
      <div class="lg-i"><div class="lg-d" style="background:#2ED89A"></div> B — Media (50-100)</div>
      <div class="lg-i"><div class="lg-d" style="background:#6496FF"></div> C — Baja (20-50)</div>
      <div class="lg-i"><div class="lg-d" style="background:#666"></div> D — Pequeña (&lt;20)</div>
      <div class="lg-i"><div class="lg-d" style="background:var(--accent);border:2px solid #2ED89A"></div> Pipeline</div>
    </div>
  </div>
</div>

<!-- ═══ COMPARE OVERLAY ═══ -->
<div class="compare-overlay" id="compareOverlay">
  <div class="compare-box">
    <h3><span>⚖️ Comparación de Edificios</span><button class="close-cmp" onclick="closeCompare()">✕</button></h3>
    <div class="compare-grid" id="compareGrid" style="grid-template-columns:repeat(auto-fit,minmax(220px,1fr))"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
const USERS = {ruben:'Solaris2026!',kaniel:'Solaris2026!'};
let currentUser = null;

function attemptLogin(){
  const u = document.getElementById('loginUser').value.trim().toLowerCase();
  const p = document.getElementById('loginPass').value;
  if(USERS[u] && USERS[u]===p){
    currentUser = u;
    sessionStorage.setItem('sa_user',u);
    showApp();
  } else {
    document.getElementById('loginError').textContent='Usuario o contraseña incorrectos';
    document.getElementById('loginBox').classList.add('shake');
    setTimeout(()=>document.getElementById('loginBox').classList.remove('shake'),500);
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('loginOverlay').style.display!=='none'&&!document.getElementById('loginOverlay').classList.contains('hidden'))attemptLogin()});

function showApp(){
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('appHeader').style.display='';
  document.getElementById('appMain').style.display='';
  document.getElementById('loading').style.display='flex';
  document.getElementById('userDisplay').textContent=currentUser;
  setTimeout(initApp,100);
}

function doLogout(){
  sessionStorage.removeItem('sa_user');
  location.reload();
}

// Check session on load
(function(){
  const saved=sessionStorage.getItem('sa_user');

const RAW = [];
let _id=0;
function B(name,lat,lon,cat,area){
  _id++;
  const kwp=Math.round(area*0.15);
  const ann=Math.round(kwp*ANNUAL_KWH_PER_KWP);
  const sav=Math.round(ann*TARIFF*100)/100;
  const inv=kwp*COST_PER_KWP;
  const pay=sav>0?Math.round(inv/sav*10)/10:99;
  const pr=kwp>=100?'A':kwp>=50?'B':kwp>=20?'C':'D';
  RAW.push({id:_id,n:name,la:lat,lo:lon,c:cat,a:area,kwp,ann,sav,inv,pay,pr,pip:0});
}

const buildings = RAW;

let currentFilter = {priority:'all',category:null,minSize:0,pipeline:false,search:''};
let compareSet = new Set();
let notes = {};
let pipelineState = {};
let map;

try{
  notes=JSON.parse(localStorage.getItem('sa_notes')||'{}');
  pipelineState=JSON.parse(localStorage.getItem('sa_pipeline')||'{}');
  buildings.forEach(b=>{if(pipelineState[b.id]!==undefined)b.pip=pipelineState[b.id]});
}catch(e){}

function initApp(){
  map = new maplibregl.Map({
    container:'map',
    style:{
      version:8,
      glyphs:'https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf',
      sources:{
        'osm':{type:'raster',tiles:['https://tile.openstreetmap.org/{z}/{x}/{y}.png'],tileSize:256,maxzoom:19,attribution:'© OpenStreetMap'}
      },
      layers:[{id:'osm-layer',type:'raster',source:'osm'}]
    },
    center:[-58.490818,-34.868172],
    zoom:12,
    maxZoom:19,
    minZoom:9
  });

  map.on('load',()=>{
    initMapLayers();
    renderBuildings();
    renderAnalytics();
    updateHeaderStats();
    document.getElementById('loading').classList.add('done');
  });
}

let currentStyle='streets';
function setMapStyle(style){
  currentStyle=style;
  document.getElementById('btn-streets').classList.toggle('active',style==='streets');
  document.getElementById('btn-sat').classList.toggle('active',style==='satellite');
  const tiles=style==='satellite'
    ?['https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}']
    :['https://tile.openstreetmap.org/{z}/{x}/{y}.png'];
  map.getSource('osm').tiles=tiles;
  map.style.sourceCaches['osm'].clearTiles();
  map.style.sourceCaches['osm'].update(map.transform);
  map.triggerRepaint();
}

function resetView(){map.flyTo({center:[-58.490818,-34.868172],zoom:12})}

function initMapLayers(){
  const features=buildings.map(b=>({
    type:'Feature',
    geometry:{type:'Point',coordinates:[b.lo,b.la]},
    properties:{id:b.id,pr:b.pr,kwp:b.kwp,pip:b.pip,a:b.a,n:b.n,c:b.c}
  }));
  map.addSource('buildings',{type:'geojson',data:{type:'FeatureCollection',features}});
  map.addLayer({
    id:'buildings-circles',type:'circle',source:'buildings',
    filter:['==',['get','pip'],0],
    paint:{
      'circle-radius':['interpolate',['linear'],['zoom'],9,2,12,4,16,9],
      'circle-color':['match',['get','pr'],'A','#D4A843','B','#2ED89A','C','#6496FF','#666666'],
      'circle-opacity':0.85,
      'circle-stroke-width':1,
      'circle-stroke-color':'rgba(255,255,255,0.4)'
    }
  });
  map.addLayer({
    id:'buildings-pipeline',type:'circle',source:'buildings',
    filter:['==',['get','pip'],1],
    paint:{
      'circle-radius':['interpolate',['linear'],['zoom'],9,3,12,6,16,11],
      'circle-color':'#1A7A5A',
      'circle-opacity':0.9,
      'circle-stroke-width':2,
      'circle-stroke-color':'#2ED89A'
    }
  });
  map.on('click','buildings-circles',e=>showPopup(e));
  map.on('click','buildings-pipeline',e=>showPopup(e));
  map.on('mouseenter','buildings-circles',()=>{map.getCanvas().style.cursor='pointer'});
  map.on('mouseleave','buildings-circles',()=>{map.getCanvas().style.cursor=''});
  map.on('mouseenter','buildings-pipeline',()=>{map.getCanvas().style.cursor='pointer'});
  map.on('mouseleave','buildings-pipeline',()=>{map.getCanvas().style.cursor=''});
}

function showPopup(e){
  const f=e.features[0];
  const bid=f.properties.id;
  const b=buildings.find(x=>x.id===bid);
  if(!b)return;
  const waLink=`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(`Hola Solaris, vi "${b.n}" en el Roof Scanner. Me interesa una propuesta solar.`)}`;
  const noteVal=notes[b.id]||'';
  const isPip=b.pip?'active':'';
  const html=`
    <div class="popup-title">${b.n}</div>
    <div class="popup-sub">${CAT_ICONS[b.c]||'📍'} ${CAT_LABELS[b.c]||b.c} · ${b.a.toLocaleString()} m² · Grado ${b.pr}</div>
    <div class="popup-grid">
      <div><div class="pg-label">Sistema</div><div class="pg-val">${b.kwp} kWp</div></div>
      <div><div class="pg-label">Paneles</div><div class="pg-val">${Math.round(b.kwp/0.55)}</div></div>
      <div><div class="pg-label">Generación anual</div><div class="pg-val">${b.ann.toLocaleString()} kWh</div></div>
      <div><div class="pg-label">Ahorro anual</div><div class="pg-val">US$${b.sav.toLocaleString()}</div></div>
      <div><div class="pg-label">Inversión</div><div class="pg-val">US$${b.inv.toLocaleString()}</div></div>
      <div><div class="pg-label">Retorno</div><div class="pg-val">${b.pay} años</div></div>
    </div>
    <div class="popup-btns">
      <a class="wa-btn" href="${waLink}" target="_blank">📱 WhatsApp</a>
      <button class="proposal-btn" onclick="generateProposal(${b.id})">📄 Solicitar Propuesta</button>
    </div>
    <div class="popup-btns" style="margin-top:6px">
      <button class="pip-toggle-btn ${isPip}" onclick="togglePipeline(${b.id},this)">🟢 ${b.pip?'En Pipeline':'Agregar al Pipeline'}</button>
    </div>
    <textarea class="note-area" placeholder="Agregar notas..." onchange="saveNote(${b.id},this.value)">${noteVal}</textarea>
  `;
  new maplibregl.Popup({maxWidth:'360px'}).setLngLat(e.lngLat).setHTML(html).addTo(map);
}

// ── Sidebar: Buildings ──
function getFilteredBuildings(){
  return buildings.filter(b=>{
    if(currentFilter.priority!=='all'&&b.pr!==currentFilter.priority)return false;
    if(currentFilter.category&&b.c!==currentFilter.category)return false;
    if(b.a<currentFilter.minSize)return false;
    if(currentFilter.pipeline&&!b.pip)return false;
    if(currentFilter.search){
      const q=currentFilter.search.toLowerCase();
      if(!b.n.toLowerCase().includes(q)&&!b.c.toLowerCase().includes(q))return false;
    }
    return true;
  });
}

function sortBuildings(list){
  const s=document.getElementById('sortSelect').value;
  return[...list].sort((a,b)=>{
    if(s==='kwp')return b.kwp-a.kwp;
    if(s==='area')return b.a-a.a;
    if(s==='savings')return b.sav-a.sav;
    if(s==='payback')return a.pay-b.pay;
    if(s==='name')return a.n.localeCompare(b.n);
    return 0;
  });
}

function renderBuildings(){
  const filtered=sortBuildings(getFilteredBuildings());
  updateMapFilter(filtered);
  const show=filtered.slice(0,200);
  const container=document.getElementById('buildingList');
  container.innerHTML=`<div style="padding:8px 12px;font-size:11px;opacity:0.5">${filtered.length} edificios${filtered.length>200?' (mostrando primeros 200)':''}</div>`+
    show.map(b=>{
      const isC=compareSet.has(b.id);
      return`<div class="bldg-card ${isC?'selected':''}" onclick="flyTo(${b.lo},${b.la},${b.id})" data-id="${b.id}">
        <div class="bldg-top">
          <div class="bldg-name">${b.n}</div>
          <div class="bldg-badge badge-${b.pr}">${b.pr}</div>
        </div>
        <div class="bldg-meta">${CAT_ICONS[b.c]||'📍'} ${CAT_LABELS[b.c]||b.c} · ${b.a.toLocaleString()} m²</div>
        <div class="bldg-stats">
          <span>${b.kwp} kWp</span> ·
          <span>US$${b.sav.toLocaleString()}/año</span>
          ${b.pip?'<span style="color:var(--accent)"> · 🟢</span>':''}
        </div>
        <div class="bldg-actions">
          <button onclick="event.stopPropagation();toggleCompare(${b.id})" ${isC?'style="border-color:var(--gold);color:var(--gold)"':''}>⚖️</button>
          <button class="${b.pip?'pip-on':''}" onclick="event.stopPropagation();togglePipelineFromList(${b.id})">🟢</button>
        </div>
      </div>`;
    }).join('');
}

function updateMapFilter(filtered){
  if(!map||!map.getLayer('buildings-circles'))return;
  if(currentFilter.priority==='all'&&!currentFilter.category&&currentFilter.minSize===0&&!currentFilter.pipeline&&!currentFilter.search){
    map.setFilter('buildings-circles',['==',['get','pip'],0]);
    map.setFilter('buildings-pipeline',['==',['get','pip'],1]);
  }else{
    const ids=[...new Set(filtered.map(b=>b.id))];
    map.setFilter('buildings-circles',['all',['==',['get','pip'],0],['in',['get','id'],['literal',ids]]]);
    map.setFilter('buildings-pipeline',['all',['==',['get','pip'],1],['in',['get','id'],['literal',ids]]]);
  }
}

function sortAndRender(){renderBuildings()}
document.getElementById('searchInput').addEventListener('input',e=>{currentFilter.search=e.target.value;renderBuildings()});

function filterPriority(pr,btn){
  currentFilter.priority=pr;
  document.querySelectorAll('.filters-bar [data-pr]').forEach(b=>b.classList.toggle('on',b.dataset.pr===pr));
  renderBuildings();
}
function filterCat(cat,btn){
  if(currentFilter.category===cat){currentFilter.category=null;btn.classList.remove('on')}
  else{document.querySelectorAll('.filters-bar [data-cat]').forEach(b=>b.classList.remove('on'));currentFilter.category=cat;btn.classList.add('on')}
  renderBuildings();
}
function filterSize(sz,btn){
  if(currentFilter.minSize===sz){currentFilter.minSize=0;btn.classList.remove('on')}
  else{document.querySelectorAll('.filters-bar [data-sz]').forEach(b=>b.classList.remove('on'));currentFilter.minSize=sz;btn.classList.add('on')}
  renderBuildings();
}
function filterPipeline(btn){currentFilter.pipeline=!currentFilter.pipeline;btn.classList.toggle('on',currentFilter.pipeline);renderBuildings()}

function flyTo(lng,lat,id){
  map.flyTo({center:[lng,lat],zoom:17});
  setTimeout(()=>{
    const b=buildings.find(x=>x.id===id);
    if(b)showPopup({features:[{properties:{id:b.id}}],lngLat:{lng:b.lo,lat:b.la}});
  },500);
}

// ── Pipeline ──
function togglePipeline(id,btn){
  const b=buildings.find(x=>x.id===id);if(!b)return;
  b.pip=b.pip?0:1;pipelineState[id]=b.pip;
  localStorage.setItem('sa_pipeline',JSON.stringify(pipelineState));
  if(btn){btn.classList.toggle('active',b.pip);btn.textContent=b.pip?'🟢 En Pipeline':'🟢 Agregar al Pipeline'}
  refreshMapData();updateHeaderStats();
}
function togglePipelineFromList(id){
  const b=buildings.find(x=>x.id===id);if(!b)return;
  b.pip=b.pip?0:1;pipelineState[id]=b.pip;
  localStorage.setItem('sa_pipeline',JSON.stringify(pipelineState));
  refreshMapData();updateHeaderStats();renderBuildings();
}
function refreshMapData(){
  const src=map.getSource('buildings');if(!src)return;
  src.setData({type:'FeatureCollection',features:buildings.map(b=>({
    type:'Feature',geometry:{type:'Point',coordinates:[b.lo,b.la]},
    properties:{id:b.id,pr:b.pr,kwp:b.kwp,pip:b.pip,a:b.a,n:b.n,c:b.c}
  }))});
}

// ── Notes ──
function saveNote(id,val){notes[id]=val;localStorage.setItem('sa_notes',JSON.stringify(notes))}

// ── Compare ──
function toggleCompare(id){
  if(compareSet.has(id))compareSet.delete(id);
  else if(compareSet.size<3)compareSet.add(id);
  document.getElementById('compareBar').classList.toggle('show',compareSet.size>0);
  document.getElementById('cmpCount').textContent=compareSet.size;
  renderBuildings();
}
function clearCompare(){compareSet.clear();document.getElementById('compareBar').classList.remove('show');renderBuildings()}
function showCompare(){
  if(compareSet.size<2)return;
  const items=[...compareSet].map(id=>buildings.find(b=>b.id===id)).filter(Boolean);
  document.getElementById('compareGrid').innerHTML=items.map(b=>`
    <div class="compare-col">
      <h4>${b.n}</h4>
      <div class="cmp-row"><span class="cmp-label">Prioridad</span><span class="cmp-val">${b.pr}</span></div>
      <div class="cmp-row"><span class="cmp-label">Categoría</span><span class="cmp-val">${CAT_LABELS[b.c]||b.c}</span></div>
      <div class="cmp-row"><span class="cmp-label">Área</span><span class="cmp-val">${b.a.toLocaleString()} m²</span></div>
      <div class="cmp-row"><span class="cmp-label">Sistema</span><span class="cmp-val">${b.kwp} kWp</span></div>
      <div class="cmp-row"><span class="cmp-label">Paneles</span><span class="cmp-val">${Math.round(b.kwp/0.55)}</span></div>
      <div class="cmp-row"><span class="cmp-label">Generación anual</span><span class="cmp-val">${b.ann.toLocaleString()} kWh</span></div>
      <div class="cmp-row"><span class="cmp-label">Ahorro anual</span><span class="cmp-val">US$${b.sav.toLocaleString()}</span></div>
      <div class="cmp-row"><span class="cmp-label">Inversión</span><span class="cmp-val">US$${b.inv.toLocaleString()}</span></div>
      <div class="cmp-row"><span class="cmp-label">Retorno</span><span class="cmp-val">${b.pay} años</span></div>
    </div>
  `).join('');
  document.getElementById('compareOverlay').classList.add('show');
}
function closeCompare(){document.getElementById('compareOverlay').classList.remove('show')}

// ── Proposal ──
function generateProposal(id){
  const b=buildings.find(x=>x.id===id);if(!b)return;
  const panels=Math.round(b.kwp/0.55);
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>Propuesta Solar — ${b.n}</title>

    h1{font-size:22px;color:#0B3D2E}h2{font-size:16px;color:#0B3D2E;margin:20px 0 10px;border-bottom:1px solid #ddd;padding-bottom:6px}

// ── Analytics ──
function renderAnalytics(){
  const totalKwp=buildings.reduce((s,b)=>s+b.kwp,0);
  const totalSav=buildings.reduce((s,b)=>s+b.sav,0);
  const totalInv=buildings.reduce((s,b)=>s+b.inv,0);
  const pipCount=buildings.filter(b=>b.pip).length;
  const prCounts={A:0,B:0,C:0,D:0};
  buildings.forEach(b=>prCounts[b.pr]=(prCounts[b.pr]||0)+1);
  const maxPr=Math.max(...Object.values(prCounts));
  const catCounts={};
  buildings.forEach(b=>catCounts[b.c]=(catCounts[b.c]||0)+1);
  const catSorted=Object.entries(catCounts).sort((a,b)=>b[1]-a[1]);
  const maxCat=catSorted.length?catSorted[0][1]:1;
  const top10=[...buildings].sort((a,b)=>b.kwp-a.kwp).slice(0,10);

  document.getElementById('analyticsContent').innerHTML=`
    <h3>📊 Analíticas del Portafolio</h3>
    <div class="stat-grid">
      <div class="stat-card"><div class="sv">${buildings.length}</div><div class="sl">Edificios</div></div>
      <div class="stat-card"><div class="sv">${(totalKwp/1000).toFixed(1)}</div><div class="sl">MWp Potencial</div></div>
      <div class="stat-card"><div class="sv">$${(totalInv/1000000).toFixed(1)}M</div><div class="sl">Valor EPC (USD)</div></div>
      <div class="stat-card"><div class="sv">$${(totalSav/1000000).toFixed(2)}M</div><div class="sl">Ahorro Anual</div></div>
      <div class="stat-card"><div class="sv">${Math.round(totalKwp*ANNUAL_KWH_PER_KWP*0.0005/1000)}K</div><div class="sl">Ton CO₂/año</div></div>
      <div class="stat-card"><div class="sv">${pipCount}</div><div class="sl">Pipeline</div></div>
    </div>
    <div class="chart-section">
      <h4>Distribución por Prioridad</h4>
      ${['A','B','C','D'].map(pr=>`<div class="bar-row">
        <div class="bar-label">Grado ${pr}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(prCounts[pr]/maxPr*100)}%;background:${PRIORITY_COLORS[pr]}">${prCounts[pr]}</div></div>
        <div class="bar-count">${prCounts[pr]}</div>
      </div>`).join('')}
    </div>
    <div class="chart-section">
      <h4>Por Categoría</h4>
      ${catSorted.map(([cat,cnt])=>`<div class="bar-row">
        <div class="bar-label">${CAT_ICONS[cat]||'📍'} ${(CAT_LABELS[cat]||cat).replace(/^. /,'')}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(cnt/maxCat*100)}%;background:var(--gold)">${cnt}</div></div>
        <div class="bar-count">${cnt}</div>
      </div>`).join('')}
    </div>
    <div class="chart-section">
      <h4>Top 10 por kWp</h4>
      <ol class="top-list">${top10.map((b,i)=>`<li>
        <span class="tl-rank">${i+1}</span>
        <span class="tl-name">${b.n}</span>
        <span class="tl-val">${b.kwp} kWp</span>
      </li>`).join('')}</ol>
    </div>
  `;
}

// ── Tabs ──
function switchTab(tab,btn){
  document.querySelectorAll('.sidebar-tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-buildings').style.display=tab==='buildings'?'':'none';
  document.getElementById('tab-analytics').style.display=tab==='analytics'?'':'none';
}

// ── Header Stats ──
function updateHeaderStats(){
  const totalKwp=buildings.reduce((s,b)=>s+b.kwp,0);
  const totalInv=buildings.reduce((s,b)=>s+b.inv,0);
  const pipCount=buildings.filter(b=>b.pip).length;
  document.getElementById('h-buildings').textContent=buildings.length;
  document.getElementById('h-mwp').textContent=(totalKwp/1000).toFixed(1);
  document.getElementById('h-value').textContent=(totalInv/1000000).toFixed(1);
  document.getElementById('h-pipeline').textContent=pipCount;
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&!e.ctrlKey&&document.activeElement.tagName!=='INPUT'){e.preventDefault();document.getElementById('searchInput').focus()}
  if(e.key==='Escape')closeCompare();
});
</script>
</body>
</html>
