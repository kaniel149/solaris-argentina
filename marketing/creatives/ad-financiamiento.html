<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>Solaris Argentina — Financiamiento</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0A0A0A;
    font-family: 'DM Sans', sans-serif;
    color: #FEFDFB;
    overflow: hidden;
    position: relative;
  }

  .bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 50% 20%, rgba(11,61,46,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 90%, rgba(212,168,67,0.06) 0%, transparent 40%);
  }

  .watermark {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-30deg);
    font-family: 'DM Sans', sans-serif;
    font-size: 100px; font-weight: 700;
    letter-spacing: 20px; text-transform: uppercase;
    color: rgba(254,253,251,0.015);
    white-space: nowrap; z-index: 0; pointer-events: none;
  }

  .content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; padding: 70px;
    text-align: center;
  }

  .energia-badge {
    position: absolute; top: 40px; right: 60px;
    font-size: 16px; font-weight: 500;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(212,168,67,0.6); z-index: 3;
    border: 1px solid rgba(212,168,67,0.3);
    padding: 8px 16px;
  }

  .zero-badge {
    display: inline-flex; align-items: baseline;
    margin-bottom: 20px;
  }

  .zero-dollar {
    font-family: 'Playfair Display', serif;
    font-size: 200px; font-weight: 900;
    color: #D4A843;
    line-height: 0.85;
    text-shadow:
      0 0 60px rgba(212,168,67,0.4),
      0 0 120px rgba(212,168,67,0.15);
  }

  .zero-label {
    font-family: 'Playfair Display', serif;
    font-size: 48px; font-weight: 700;
    color: #FEFDFB;
    line-height: 1.2;
    margin-bottom: 40px;
  }

  .divider {
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(212,168,67,0.5), transparent);
    margin-bottom: 40px;
  }

  .features-list {
    display: flex; flex-direction: column;
    gap: 20px;
    margin-bottom: 50px;
  }

  .feature-item {
    display: flex; align-items: center;
    gap: 16px;
    font-size: 28px; font-weight: 500;
    color: rgba(254,253,251,0.8);
  }

  .feature-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(11,61,46,0.4);
    border: 1px solid rgba(11,61,46,0.6);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: rgba(80,200,140,0.9);
    flex-shrink: 0;
  }

  .highlight {
    color: #D4A843;
    font-weight: 700;
  }

  .comparison-line {
    font-family: 'Playfair Display', serif;
    font-size: 32px; font-weight: 700;
    color: rgba(254,253,251,0.7);
    margin-bottom: 16px;
    line-height: 1.4;
  }

  .comparison-line .less {
    color: rgba(80,200,140,0.9);
    font-size: 40px;
  }

  .partner {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    margin-bottom: 50px;
    padding: 20px 40px;
    border: 1px solid rgba(254,253,251,0.06);
    border-radius: 12px;
    background: rgba(254,253,251,0.02);
  }

  .partner-label {
    font-size: 16px; font-weight: 400;
    color: rgba(254,253,251,0.3);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .partner-name {
    font-size: 28px; font-weight: 700;
    color: rgba(254,253,251,0.7);
    letter-spacing: 2px;
  }

  .cta-button {
    display: inline-block;
    padding: 24px 60px;
    background: linear-gradient(135deg, #0B3D2E, #0d4a37);
    border: 1px solid rgba(212,168,67,0.3);
    border-radius: 8px;
    font-size: 24px; font-weight: 700;
    color: #D4A843;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .bottom-brand {
    position: absolute; bottom: 36px; left: 0; right: 0;
    text-align: center;
    font-size: 18px; font-weight: 700;
    letter-spacing: 6px; text-transform: uppercase;
    color: rgba(254,253,251,0.2); z-index: 3;
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="watermark">SOLARIS ARGENTINA</div>
  <div class="energia-badge">Energía Propia</div>

  <div class="content">
    <div class="zero-badge">
      <span class="zero-dollar">$0</span>
    </div>
    <div class="zero-label">inversión inicial</div>

    <div class="divider"></div>

    <div class="features-list">
      <div class="feature-item">
        <div class="feature-icon">✓</div>
        Financiamiento hasta <span class="highlight">&nbsp;100%&nbsp;</span> con EcoLeasing
      </div>
      <div class="feature-item">
        <div class="feature-icon">✓</div>
        Cuotas fijas y predecibles
      </div>
      <div class="feature-item">
        <div class="feature-icon">✓</div>
        Sin garantías adicionales
      </div>
    </div>

    <div class="comparison-line">
      Su cuota mensual <span class="less">&lt;</span> su factura de luz
    </div>

    <div style="font-size:20px; color:rgba(254,253,251,0.4); margin-bottom:40px;">
      Ahorre desde el primer mes
    </div>

    <div class="partner">
      <div class="partner-label">En colaboración con</div>
      <div class="partner-name">Banco Comafi</div>
    </div>

    <div class="cta-button">Consulte condiciones →</div>
  </div>

  <div class="bottom-brand">Solaris Argentina</div>
</body>
</html>
