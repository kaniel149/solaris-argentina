<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1">
<title>Solaris Argentina — ROI</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    background: #0A0A0A;
    font-family: 'DM Sans', sans-serif;
    color: #FEFDFB;
    overflow: hidden;
    position: relative;
  }

  .bg-gradient {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(11,61,46,0.2) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(212,168,67,0.08) 0%, transparent 60%);
  }

  .watermark {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) rotate(-30deg);
    font-family: 'DM Sans', sans-serif;
    font-size: 100px; font-weight: 700;
    letter-spacing: 20px; text-transform: uppercase;
    color: rgba(254,253,251,0.02);
    white-space: nowrap; z-index: 0; pointer-events: none;
  }

  .content {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%; padding: 70px;
    text-align: center;
  }

  .energia-badge {
    position: absolute; top: 40px; right: 60px;
    font-size: 16px; font-weight: 500;
    letter-spacing: 3px; text-transform: uppercase;
    color: rgba(212,168,67,0.6); z-index: 3;
    border: 1px solid rgba(212,168,67,0.3);
    padding: 8px 16px;
  }

  .comparison {
    display: flex; align-items: stretch;
    gap: 40px; margin-bottom: 50px; width: 100%;
    max-width: 880px;
  }

  .compare-box {
    flex: 1;
    padding: 50px 36px;
    border-radius: 16px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .compare-box.before {
    background: linear-gradient(180deg, rgba(180,40,40,0.15) 0%, rgba(180,40,40,0.05) 100%);
    border: 1px solid rgba(180,40,40,0.25);
  }

  .compare-box.after {
    background: linear-gradient(180deg, rgba(11,61,46,0.25) 0%, rgba(11,61,46,0.08) 100%);
    border: 1px solid rgba(11,61,46,0.4);
  }

  .compare-label {
    font-size: 22px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 3px;
    margin-bottom: 16px;
  }
  .before .compare-label { color: rgba(220,100,100,0.8); }
  .after .compare-label { color: rgba(80,200,140,0.9); }

  .compare-amount {
    font-family: 'Playfair Display', serif;
    font-size: 72px; font-weight: 900;
    line-height: 1;
  }
  .before .compare-amount { color: rgba(220,100,100,0.9); }
  .after .compare-amount {
    color: #D4A843;
    text-shadow: 0 0 40px rgba(212,168,67,0.4);
  }

  .compare-unit {
    font-size: 20px; font-weight: 400;
    color: rgba(254,253,251,0.5);
    margin-top: 8px;
  }

  .vs-divider {
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 700;
    color: rgba(254,253,251,0.3);
    min-width: 40px;
  }

  .stats-row {
    display: flex; gap: 50px;
    margin-bottom: 40px;
  }

  .stat {
    text-align: center;
  }

  .stat-number {
    font-family: 'Playfair Display', serif;
    font-size: 42px; font-weight: 900;
    color: #D4A843;
  }

  .stat-label {
    font-size: 18px; font-weight: 400;
    color: rgba(254,253,251,0.5);
    margin-top: 4px;
  }

  .main-text {
    font-family: 'Playfair Display', serif;
    font-size: 36px; font-weight: 700;
    color: #FEFDFB; line-height: 1.3;
    margin-bottom: 12px;
  }

  .sub-text {
    font-size: 22px; font-weight: 400;
    color: rgba(254,253,251,0.5);
    margin-bottom: 50px;
  }

  .cta-button {
    display: inline-block;
    padding: 22px 56px;
    background: linear-gradient(135deg, #0B3D2E 0%, #0d4a37 100%);
    border: 1px solid rgba(212,168,67,0.3);
    border-radius: 8px;
    font-size: 24px; font-weight: 700;
    color: #D4A843; letter-spacing: 2px;
    text-transform: uppercase;
  }

  .bottom-brand {
    position: absolute; bottom: 36px; left: 0; right: 0;
    text-align: center;
    font-size: 18px; font-weight: 700;
    letter-spacing: 6px; text-transform: uppercase;
    color: rgba(254,253,251,0.2); z-index: 3;
  }
</style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="watermark">SOLARIS ARGENTINA</div>
  <div class="energia-badge">Energía Propia</div>

  <div class="content">
    <div class="comparison">
      <div class="compare-box before">
        <div class="compare-label">Hoy</div>
        <div class="compare-amount">$850K</div>
        <div class="compare-unit">/mes en electricidad</div>
      </div>
      <div class="vs-divider">vs</div>
      <div class="compare-box after">
        <div class="compare-label">Con Solar</div>
        <div class="compare-amount">$0</div>
        <div class="compare-unit">/mes en electricidad</div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="stat-number">4–6</div>
        <div class="stat-label">años de retorno</div>
      </div>
      <div class="stat">
        <div class="stat-number">25+</div>
        <div class="stat-label">años de ahorro</div>
      </div>
      <div class="stat">
        <div class="stat-number">500+</div>
        <div class="stat-label">instalaciones</div>
      </div>
    </div>

    <div class="main-text">Retorno garantizado</div>
    <div class="sub-text">Experiencia internacional al servicio de su empresa</div>

    <div class="cta-button">Calcule su ahorro →</div>
  </div>

  <div class="bottom-brand">Solaris Argentina</div>
</body>
</html>
